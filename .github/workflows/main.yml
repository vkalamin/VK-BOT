name: BADOL-BOT-V5 ULTIMATE CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies (For Canvas & SQLite3)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        # লক ফাইল ছাড়া ক্যাশ লক এরর এড়াতে এখানে cache অপশনটি বাদ দেওয়া হয়েছে

    - name: Install Dependencies
      run: |
        npm install # npm ci এর বদলে npm install ব্যবহার করা হয়েছে যাতে লক ফাইল অটোমেটিক জেনারেট হয়

    - name: Create AppState File from Secret
      env:
        APPSTATE_DATA: ${{ secrets.BADOL_APPSTATE }}
      run: |
        echo "$APPSTATE_DATA" > BADOL-Appstate.json # env ব্যবহার করায় বড় এবং জটিল JSON ডেটাও এখন ফাইলটিতে নিখুঁতভাবে রাইট হবে

    - name: Start BADOL-BOT V5
      run: npm start
